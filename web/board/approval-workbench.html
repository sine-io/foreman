<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Foreman Approval Workbench</title>
    <link rel="stylesheet" href="/board/assets/styles.css" />
  </head>
  <body>
    <main class="board-shell approval-workbench-shell">
      <header class="board-header">
        <p class="eyebrow">Foreman</p>
        <h1>Approval Workbench</h1>
        <p class="subtitle">
          Review pending approvals, inspect historical outcomes, and act without losing refresh-safe
          deep links.
        </p>
      </header>

      <section class="board-toolbar workbench-toolbar">
        <label class="board-label" for="approval-workbench-project-id">Project ID</label>
        <input id="approval-workbench-project-id" class="board-input" value="demo" />
        <button id="approval-workbench-refresh" class="board-button" type="button">Refresh</button>
        <a class="board-link" href="/board">Back to Board</a>
        <p id="approval-workbench-status" class="board-status">Loading approval queue...</p>
      </section>

      <section class="approval-workbench-layout">
        <aside class="board-panel approval-queue-panel">
          <header class="panel-header">
            <p class="panel-kicker">Queue</p>
            <h2>Pending Approvals</h2>
          </header>
          <div id="approval-workbench-queue" class="approval-workbench-queue"></div>
        </aside>

        <section class="board-panel approval-review-panel">
          <header class="panel-header">
            <p class="panel-kicker">Review</p>
            <h2>Decision Panel</h2>
          </header>
          <div id="approval-workbench-detail" class="approval-workbench-detail"></div>
        </section>
      </section>
    </main>

    <script src="/board/assets/approval-workbench.js"></script>
  </body>
</html>
