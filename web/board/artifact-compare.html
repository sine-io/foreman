<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Foreman Artifact Compare</title>
    <link rel="stylesheet" href="/board/assets/styles.css" />
  </head>
  <body>
    <main class="board-shell artifact-compare-shell">
      <header class="board-header">
        <p class="eyebrow">Foreman</p>
        <h1>Artifact Compare</h1>
        <p class="subtitle">
          Compare one artifact with the previous same-task same-kind artifact without leaving the
          operator workbench flow.
        </p>
      </header>

      <section class="board-toolbar workbench-toolbar">
        <p class="board-label">Artifact ID</p>
        <p id="artifact-compare-artifact-id" class="board-status artifact-compare-current-id">Not loaded</p>
        <button id="artifact-compare-refresh" class="board-button" type="button">
          Refresh compare
        </button>
        <p id="artifact-compare-status" class="board-status">Loading artifact compare...</p>
      </section>

      <section class="artifact-compare-layout">
        <section class="board-panel artifact-compare-current-panel">
          <header class="panel-header">
            <p class="panel-kicker">Current</p>
            <h2>Current Artifact</h2>
          </header>
          <div id="artifact-compare-current" class="artifact-compare-detail"></div>
        </section>

        <section class="board-panel artifact-compare-diff-panel">
          <header class="panel-header">
            <p class="panel-kicker">Compare</p>
            <h2>Compare Result</h2>
          </header>
          <div id="artifact-compare-result" class="artifact-compare-detail"></div>
        </section>

        <section class="board-panel artifact-compare-previous-panel">
          <header class="panel-header">
            <p class="panel-kicker">History</p>
            <h2>Selected History Artifact</h2>
          </header>
          <div id="artifact-compare-previous" class="artifact-compare-detail"></div>
        </section>
      </section>
    </main>

    <script src="/board/assets/artifact-compare.js"></script>
  </body>
</html>
