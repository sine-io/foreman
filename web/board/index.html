<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Foreman Board</title>
    <link rel="stylesheet" href="/board/assets/styles.css" />
  </head>
  <body>
    <main class="board-shell">
      <header class="board-header">
        <p class="eyebrow">Foreman</p>
        <h1>Local Control Plane Board</h1>
        <p class="subtitle">Board HTTP surface for modules, tasks, approvals, and run detail.</p>
      </header>
      <section class="board-toolbar">
        <label class="board-label" for="project-id">Project ID</label>
        <input id="project-id" class="board-input" value="demo" />
        <button id="refresh-board" class="board-button" type="button">Refresh</button>
        <p id="board-status" class="board-status">Loading board data...</p>
      </section>
      <section id="board-root" class="board-layout">
        <article class="board-panel">
          <header class="panel-header">
            <p class="panel-kicker">Modules</p>
            <h2>Module Board</h2>
          </header>
          <div id="modules-root" class="column-grid"></div>
        </article>
        <article class="board-panel">
          <header class="panel-header">
            <p class="panel-kicker">Tasks</p>
            <h2>Task Board</h2>
          </header>
          <div id="tasks-root" class="column-grid"></div>
        </article>
        <article class="board-panel">
          <header class="panel-header">
            <p class="panel-kicker">Approvals</p>
            <h2>Pending Queue</h2>
          </header>
          <div id="approvals-root" class="approval-list"></div>
        </article>
      </section>
    </main>
    <script src="/board/assets/app.js"></script>
  </body>
</html>
